services:
  - type: web
    name: patentlens-studio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: singapore
    envVars:
      - key: ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: patentlens-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY1
        sync: false
      - key: GEMINI_API_KEY2
        sync: false
      - key: TWO_CAPTCHA_API_KEY
        sync: false
      - key: INDIA_PATENT_HEADLESS
        value: "true"

databases:
  - name: patentlens-db
    databaseName: patentlens
    user: patentlens
    plan: free
